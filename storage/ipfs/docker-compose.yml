version: '3.8'

services:
  zera-ipfs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zera-ipfs
    ports:
      - "10000:10000"
    environment:
      - PINATA_JWT=${PINATA_JWT}
      - PORT=10000
      - RUST_LOG=info
    volumes:
      - ./downloads:/app/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - zera-network

networks:
  zera-network:
    driver: bridge
